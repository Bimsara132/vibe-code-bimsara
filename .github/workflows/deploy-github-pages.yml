name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAGES: 'true'
      NEXT_PUBLIC_API_BASE_URL: https://api.iblai.app
      NEXT_PUBLIC_AUTH_URL: https://login.iblai.app
      NEXT_PUBLIC_BASE_WS_URL: wss://asgi.data.iblai.app
      NEXT_PUBLIC_PLATFORM_BASE_DOMAIN: iblai.app
      NEXT_PUBLIC_MAIN_TENANT_KEY: 1ea155c0e8ee4978a146f5a83a1c0e5a
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static site
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
